<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<header th:fragment="header" class="bg-white border-b border-gray-200 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">

        <!-- 로고 -->
        <div class="flex items-center gap-3">

            <img th:src="@{/images/logo_tmp.png}"
                 alt="logo"
                 class="w-12 h-12 object-contain"/>

            <!-- 메뉴 -->
            <nav class="flex items-center gap-4">
                <!-- 활성 메뉴 -->
                <a th:href="@{/rooms}"
                   class="px-3 py-2 text-sm font-medium rounded-md bg-gray-100 text-black">
                    회의실 조회
                </a>
            </nav>

        </div>

        <!-- 메뉴 -->
        <div class="flex items-center gap-3">



            <!-- 로그인 여부 -->
            <th:block th:if="${session.loginUser != null}">
                <a th:href="@{/reservations}"
                   class="px-4 py-2 border border-gray-300 rounded-lg text-sm hover:bg-gray-50">
                    내 예약
                </a>

                <a th:href="@{/mypage}"
                   class="px-4 py-2 border border-gray-300 rounded-lg text-sm hover:bg-gray-50">
                    MyPage
                </a>

                <a th:href="@{/logout}"
                   class="inline-flex items-center gap-2 px-4 py-2 border border-gray-300 rounded-lg text-sm hover:bg-gray-50">
                    <svg xmlns="http://www.w3.org/2000/svg"
                         viewBox="0 0 24 24"
                         fill="none"
                         stroke="currentColor"
                         stroke-width="2"
                         stroke-linecap="round"
                         stroke-linejoin="round"
                         class="w-4 h-4">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    로그아웃
                </a>
            </th:block>

            <th:block th:unless="${session.loginUser != null}">
                <a th:href="@{/users/login}"
                   class="px-4 py-2 border border-gray-300 rounded-lg text-sm hover:bg-gray-50">
                    Sign In
                </a>

                <a th:href="@{/users/login}"
                   class="px-4 py-2 border bg-black text-white rounded-lg text-sm hover:bg-gray-700">
                    Register
                </a>
            </th:block>
        </div>

    </div>
</header>

</body>
</html>
