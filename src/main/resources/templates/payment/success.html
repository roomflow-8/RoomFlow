<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>결제 완료</title>
</head>
<body>
<div class="container">
    <h1>결제가 완료되었습니다!</h1>

    <div class="payment-info">
        <p>주문번호: <span th:text="${payment.orderId}"></span></p>
        <p>주문명: <span th:text="${payment.orderName}"></span></p>
        <p>결제금액: <span th:text="${#numbers.formatInteger(payment.totalAmount, 0, 'COMMA')}"></span>원</p>
        <p>결제수단: <span th:text="${payment.method}"></span></p>
        <p>승인시간: <span th:text="${payment.approvedAt}"></span></p>
        <a th:if="${payment.receiptUrl != null}" th:href="${payment.receiptUrl}" target="_blank">영수증 보기</a>
    </div>

    <a href="/rooms" class="btn">홈으로</a>
</div>

</body>
</html>
