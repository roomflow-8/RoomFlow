<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>결제 완료 - RoomFlow</title>
    <link rel="icon" type="image/png" th:href="@{/images/logo_tmp.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="min-h-screen bg-[#fafafa]">

<div th:replace="~{fragments/header :: header}"></div>

<main class="max-w-2xl mx-auto px-8 py-12">

    <!-- 성공 아이콘 -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-green-100 rounded-full mb-4">
            <i class="fi fi-rr-check text-green-600 text-4xl leading-none flex items-center"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-900">결제가 완료되었습니다!</h1>
        <p class="text-gray-500 mt-2">예약이 확정되었습니다.</p>
    </div>

    <!-- 결제 정보 카드 -->
    <div class="bg-white rounded-xl shadow-sm border">
        <div class="px-6 py-4 border-b">
            <h2 class="text-xl font-semibold">결제 정보</h2>
        </div>

        <div class="px-6 py-6 space-y-4">
            <div class="flex justify-between items-center">
                <span class="text-gray-600">주문번호</span>
                <span class="font-medium" th:text="${payment.orderId}"></span>
            </div>

            <div class="flex justify-between items-center">
                <span class="text-gray-600">주문명</span>
                <span class="font-medium" th:text="${payment.orderName}"></span>
            </div>

            <hr>

            <div class="flex justify-between items-center">
                <span class="text-gray-600">결제수단</span>
                <span class="font-medium" th:text="${payment.method}"></span>
            </div>

            <div class="flex justify-between items-center">
                <span class="text-gray-600">승인시간</span>
                <span class="font-medium" th:text="${payment.approvedAt}"></span>
            </div>

            <hr>

            <div class="flex justify-between items-center">
                <span class="font-bold text-lg">결제금액</span>
                <span class="font-bold text-2xl text-blue-600"
                      th:text="|${#numbers.formatInteger(payment.totalAmount, 0, 'COMMA')}원|"></span>
            </div>
        </div>
    </div>

    <!-- 영수증 링크 -->
    <div th:if="${payment.receiptUrl != null}" class="mt-4">
        <a th:href="${payment.receiptUrl}"
           target="_blank"
           class="w-full h-12 border rounded-md flex items-center justify-center gap-2 hover:bg-gray-50 transition-colors">
            <i class="fi fi-rr-receipt leading-none flex items-center"></i>
            <span>영수증 보기</span>
        </a>
    </div>

    <!-- 버튼 영역 -->
    <div class="mt-6 space-y-3">
        <a href="/users/reservationlist"
           class="w-full h-12 bg-black text-white rounded-md flex items-center justify-center hover:bg-gray-800 transition-colors">
            내 예약 확인하기
        </a>

        <a href="/rooms"
           class="w-full h-12 border rounded-md flex items-center justify-center hover:bg-gray-50 transition-colors">
            홈으로 돌아가기
        </a>
    </div>

    <!-- 안내 문구 -->
    <div class="mt-8 text-center text-sm text-gray-500 space-y-1">
        <p>결제 내역은 마이페이지에서 확인할 수 있습니다.</p>
        <p>취소 및 환불은 예약 정책을 확인해주세요.</p>
    </div>

</main>

</body>
</html>
