<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>결제 실패 - RoomFlow</title>
    <link rel="icon" type="image/png" th:href="@{/images/logo_tmp.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="min-h-screen bg-[#fafafa]">

<div th:replace="~{fragments/header :: header}"></div>

<main class="max-w-2xl mx-auto px-8 py-12">

    <!-- 실패 아이콘 -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-red-100 rounded-full mb-4">
            <i class="fi fi-rr-cross text-red-600 text-4xl leading-none flex items-center"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-900">결제에 실패했습니다</h1>
        <p class="text-gray-500 mt-2">아래 내용을 확인해주세요.</p>
    </div>

    <!-- 에러 정보 카드 -->
    <div class="bg-white rounded-xl shadow-sm border">
        <div class="px-6 py-4 border-b">
            <h2 class="text-xl font-semibold">오류 정보</h2>
        </div>

        <div class="px-6 py-6 space-y-4">
            <div class="flex justify-between items-center">
                <span class="text-gray-600">에러 코드</span>
                <span class="font-medium text-red-600" th:text="${fail.code}"></span>
            </div>

            <hr>

            <div>
                <span class="text-gray-600">에러 메시지</span>
                <p class="font-medium mt-1" th:text="${fail.message}"></p>
            </div>

            <div th:if="${fail.orderId != null}">
                <hr>
                <div class="flex justify-between items-center pt-4">
                    <span class="text-gray-600">주문번호</span>
                    <span class="font-medium" th:text="${fail.orderId}"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- 에러 코드별 안내 -->
    <div class="mt-6 bg-gray-50 rounded-lg p-4">
        <p class="text-sm text-gray-600">
            <span th:if="${fail.code == 'PAY_PROCESS_CANCELED'}">
                결제가 취소되었습니다. 다시 시도해주세요.
            </span>
            <span th:if="${fail.code == 'PAY_PROCESS_ABORTED'}">
                결제 인증에 실패했습니다. 결제 정보를 확인 후 다시 시도해주세요.
            </span>
            <span th:if="${fail.code == 'REJECT_CARD_COMPANY'}">
                카드사에서 결제를 거부했습니다. 카드사에 문의하거나 다른 카드를 이용해주세요.
            </span>
            <span th:if="${fail.code == 'NOT_FOUND_PAYMENT_SESSION'}">
                결제 시간이 만료되었습니다. 처음부터 다시 시도해주세요.
            </span>
        </p>
    </div>

    <!-- 버튼 영역 -->
    <div class="mt-6 space-y-3">
        <a href="javascript:history.back()"
           class="w-full h-12 bg-black text-white rounded-md flex items-center justify-center hover:bg-gray-800 transition-colors">
            다시 시도하기
        </a>

        <a href="/rooms"
           class="w-full h-12 border rounded-md flex items-center justify-center hover:bg-gray-50 transition-colors">
            홈으로 돌아가기
        </a>
    </div>

    <!-- 안내 문구 -->
    <div class="mt-8 text-center text-sm text-gray-500 space-y-1">
        <p>문제가 계속되면 고객센터로 문의해주세요.</p>
    </div>

</main>

</body>
</html>
