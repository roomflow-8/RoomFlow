<div th:fragment="summary(reservationRoom)" class="bg-white rounded-xl shadow-sm border sticky top-8">
    <div class="px-6 py-4 border-b">
        <h2 class="text-xl font-semibold">예약 요약</h2>
    </div>

    <div class="px-6 py-6">
        <div class="space-y-4">
            <div class="space-y-2">
                <div class="flex justify-between text-sm">
                    <span class="text-gray-600">회의실 이용료</span>
                    <span th:text="${reservationRoom.priceText()}"></span>
                </div>
            </div>

            <hr>

            <div class="flex justify-between items-center">
                <span class="font-bold text-lg">총 금액</span>
                <span class="font-bold text-2xl text-blue-600"
                      th:text="${reservationRoom.priceText()}"></span>
            </div>

            <div class="space-y-2">
                <a th:href="@{/equipment-list/{reservationId}/equipments(reservationId=${reservationRoom.reservationId})}"
                   class="w-full h-12 text-base border rounded-md flex items-center justify-center hover:bg-gray-50">
                    비품 추가하기
                </a>

                <button type="submit"
                        class="w-full h-12 text-lg bg-black text-white rounded-md hover:bg-gray-800">
                    예약 확정하기
                </button>
            </div>

            <div class="text-xs text-gray-500 space-y-1 pt-4">
                <p>• 예약 확정 후 회의실 예약이 완료됩니다.</p>
                <p>• 비품은 언제든지 추가 가능합니다.</p>
                <p>• 취소 및 환불 규정은 예약 정책을 확인하세요.</p>
            </div>
        </div>
    </div>
</div>
