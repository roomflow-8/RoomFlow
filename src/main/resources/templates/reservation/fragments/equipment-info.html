<th:block th:fragment="equipmentInfo(reservationRoom)">

    <section class="bg-white rounded-xl shadow-sm border">

        <div class="flex items-center gap-2 px-6 py-4 border-b">
            <i class="fi fi-rr-box text-blue-600 text-xl leading-none flex items-center"></i>
            <h2 class="text-xl font-semibold">선택한 비품</h2>
        </div>

        <div class="px-6 py-6 space-y-3">

            <div th:each="equipment : ${reservationRoom.equipments}"
                 class="flex items-center justify-between border-b pb-3 last:border-0">

                <input type="hidden"
                       name="reservationEquipmentIds"
                       th:value="${equipment.reservationEquipmentId}" />

                <div>
                    <p class="font-semibold"
                       th:text="${equipment.equipmentName}">
                    </p>

                    <p class="text-sm text-gray-500">
                        <span th:text="|${#numbers.formatInteger(equipment.unitPrice,0,'COMMA')}원|"></span>
                        ×
                        <span th:text="${equipment.quantity}"></span>개
                    </p>
                </div>

                <div class="font-bold text-blue-600"
                     th:text="|${#numbers.formatInteger(equipment.totalAmount,0,'COMMA')}원|">
                </div>

            </div>

        </div>

    </section>

</th:block>
