<div th:fragment="roomInfo(reservationRoom)" class="bg-white rounded-xl shadow-sm border">
    <div class="px-6 py-4 border-b">
        <div class="flex items-center gap-2">
            <span class="text-blue-600">🏢</span>
            <h2 class="text-xl font-semibold">회의실 예약 정보</h2>
        </div>
    </div>

    <div class="px-6 py-6">
        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <p class="text-sm text-gray-600">회의실</p>
                    <p class="font-semibold text-lg" th:text="${reservationRoom.roomName}"></p>
                </div>

                <div>
                    <p class="text-sm text-gray-600">날짜</p>
                    <p class="font-semibold" th:text="${reservationRoom.reservationDate}"></p>
                </div>

                <div>
                    <p class="text-sm text-gray-600 mb-2">시간</p>
                    <div class="flex flex-wrap gap-2">
                        <span th:each="timeSlot : ${reservationRoom.reservationTimeSlots}"
                              th:text="${timeSlot.timeRange()}"
                              class="px-3 py-1 text-sm rounded-md bg-gray-100 text-gray-700">
                        </span>
                    </div>
                </div>

                <div>
                    <p class="text-sm text-gray-600">인원</p>
                    <p class="font-semibold">
                        <span th:text="${reservationRoom.capacity}"></span>명
                    </p>
                </div>
            </div>

            <hr>

            <div class="flex justify-between items-center">
                <span class="text-gray-600">회의실 이용료</span>
                <span class="font-bold text-lg" th:text="${reservationRoom.priceText()}"></span>
            </div>
        </div>
    </div>
</div>
