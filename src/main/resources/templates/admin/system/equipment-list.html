<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비품 관리 | RoomFlow</title>
    <link rel="icon" type="image/png" th:href="@{/images/logo_tmp.png}">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/header :: header}"></div>
<th:block th:replace="~{fragments/alert-script :: alertScript}"></th:block>

<div class="flex w-full min-h-screen">
    <div th:replace="~{fragments/admin-sidebar :: adminSidebar('system')}"></div>

    <main class="flex-1 p-6">
        <div th:replace="~{admin/system/system-tabs :: systemTabs('equipments')}"></div>

        <div class="flex items-center justify-end mb-6">
            <button type="button"
                    onclick="openCreateModal()"
                    class="inline-flex items-center gap-2 px-4 py-2 bg-black text-white rounded-lg text-sm font-medium hover:bg-gray-800 transition">
                <i data-lucide="plus" class="w-4 h-4"></i>
                비품 등록
            </button>
        </div>

        <div class="rounded-2xl border border-gray-200 bg-white overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">비품 목록</h2>
                <p class="text-sm text-gray-500 mt-1">
                    총 <span th:text="${equipments != null ? #lists.size(equipments) : 0}"></span>개의 비품이 있습니다.
                </p>
            </div>

            <div class="overflow-x-auto">
                <table class="min-w-full text-sm">
                    <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="px-5 py-3 text-left font-medium text-gray-600">이미지</th>
                        <th class="px-5 py-3 text-left font-medium text-gray-600">비품명</th>
                        <th class="px-5 py-3 text-left font-medium text-gray-600">설명</th>
                        <th class="px-5 py-3 text-left font-medium text-gray-600">총 수량</th>
                        <th class="px-5 py-3 text-left font-medium text-gray-600">점검 기준 수량</th>
                        <th class="px-5 py-3 text-left font-medium text-gray-600">가격</th>
                        <th class="px-5 py-3 text-left font-medium text-gray-600">상태</th>
                        <th class="px-5 py-3 text-left font-medium text-gray-600">총 예약 수</th>
                        <th class="px-5 py-3 text-left font-medium text-gray-600">수정일</th>
                        <th class="px-5 py-3 text-right font-medium text-gray-600">관리</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="equipment : ${equipments}"
                        class="border-b border-gray-100 last:border-b-0"
                        th:attr="data-equipment-id=${equipment.equipmentId},
                                 data-equipment-name=${equipment.equipmentName},
                                 data-equipment-description=${equipment.description},
                                 data-equipment-total-stock=${equipment.totalStock},
                                 data-equipment-maintenance-limit=${equipment.maintenanceLimit},
                                 data-equipment-price=${equipment.price},
                                 data-equipment-status=${equipment.status},
                                 data-equipment-image-url=${equipment.imageUrl},
                                 data-equipment-total-reservations=${equipment.totalReservations},
                                 data-equipment-created-at=${#temporals.format(equipment.createdAt, 'yyyy-MM-dd HH:mm')},
                                 data-equipment-updated-at=${#temporals.format(equipment.updatedAt, 'yyyy-MM-dd HH:mm')}">

                        <td class="px-5 py-4">
                            <div th:if="${equipment.imageUrl != null and !#strings.isEmpty(equipment.imageUrl)}" class="w-14 h-14">
                                <img th:src="${equipment.imageUrl}"
                                     alt="비품 이미지"
                                     class="w-14 h-14 rounded-lg object-cover border border-gray-200">
                            </div>
                            <div th:if="${equipment.imageUrl == null or #strings.isEmpty(equipment.imageUrl)}"
                                 class="w-14 h-14 rounded-lg border border-gray-200 bg-gray-100 flex items-center justify-center text-gray-400">
                                <i data-lucide="image-off" class="w-5 h-5"></i>
                            </div>
                        </td>

                        <td class="px-5 py-4 text-gray-900 font-medium" th:text="${equipment.equipmentName}"></td>

                        <td class="px-5 py-4 text-gray-600 max-w-xs">
                            <div class="max-w-xs"
                                 style="display:-webkit-box;
                                    -webkit-box-orient:vertical;
                                    -webkit-line-clamp:2;
                                    overflow:hidden;
                                    white-space:pre-line;"
                                 th:title="${equipment.description}"
                                 th:text="${equipment.description}">
                            </div>
                        </td>

                        <td class="px-5 py-4 text-gray-700" th:text="${equipment.totalStock} + '개'"></td>
                        <td class="px-5 py-4 text-gray-700" th:text="${equipment.maintenanceLimit} + '개'"></td>
                        <td class="px-5 py-4 text-gray-700"
                            th:text="${#numbers.formatInteger(equipment.price, 3, 'COMMA')} + '원'"></td>

                        <td class="px-5 py-4">
                            <form th:action="@{|/admin/equipments/${equipment.equipmentId}/status|}" method="post" class="flex items-center gap-2">
                                <select name="status"
                                        th:attr="data-original-status=${equipment.status.name()}"
                                        onchange="markStatusChanged(this)"
                                        class="status-select rounded-lg border border-gray-300 px-3 py-2 text-xs bg-white focus:outline-none focus:ring-2 focus:ring-black/10">
                                    <option value="AVAILABLE" th:selected="${equipment.status.name() == 'AVAILABLE'}">사용 가능</option>
                                    <option value="MAINTENANCE" th:selected="${equipment.status.name() == 'MAINTENANCE'}">점검 중</option>
                                    <option value="INACTIVE" th:selected="${equipment.status.name() == 'INACTIVE'}">비활성화</option>
                                </select>
                                <button type="submit"
                                        class="px-3 py-2 border border-gray-300 rounded-lg text-xs hover:bg-gray-50 transition">
                                    변경
                                </button>
                            </form>
                        </td>

                        <td class="px-5 py-4 text-gray-700" th:text="${equipment.totalReservations} + '건'"></td>

                        <td class="px-5 py-4 text-sm"
                            th:text="${#temporals.format(equipment.updatedAt, 'yyyy-MM-dd HH:mm')}">
                        </td>

                        <td class="px-5 py-4">
                            <div class="flex items-center justify-end gap-2">
                                <button type="button"
                                        class="px-3 py-2 border border-gray-300 rounded-lg text-xs hover:bg-gray-50 transition"
                                        onclick="openDetailModal(this)">
                                    상세
                                </button>

                                <button type="button"
                                        class="px-3 py-2 border border-gray-300 rounded-lg text-xs hover:bg-gray-50 transition"
                                        onclick="openEditModal(this)">
                                    수정
                                </button>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${equipments == null or #lists.isEmpty(equipments)}">
                        <td colspan="10" class="px-5 py-12 text-center text-sm text-gray-400">
                            등록된 비품이 없습니다.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- 생성 모달 -->
<div id="createModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4">
    <div class="bg-white w-full max-w-2xl rounded-2xl shadow-xl overflow-hidden">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
            <h3 class="text-lg font-semibold text-gray-900">비품 등록</h3>
            <button type="button" onclick="closeModal('createModal')" class="text-gray-400 hover:text-gray-600">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <form th:action="@{/admin/equipments/create}" method="post" th:object="${createForm}" enctype="multipart/form-data" class="p-6 space-y-5">
            <div th:if="${createErrorMessage != null}"
                 class="px-4 py-3 rounded-lg bg-red-50 text-red-600 text-sm"
                 th:text="${createErrorMessage}">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">비품명</label>
                    <input type="text" name="equipmentName"
                           class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-black/10">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">총 수량</label>
                    <input type="number" name="totalStock" min="1"
                           class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-black/10">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">점검 기준 수량</label>
                    <input type="number" name="maintenanceLimit" min="0"
                           class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-black/10">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">가격</label>
                    <input type="number" name="price" step="1000" min="0"
                           class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-black/10">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">상태</label>
                    <select name="status"
                            class="w-full rounded-lg border border-gray-300 px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-black/10">
                        <option value="AVAILABLE">사용 가능</option>
                        <option value="MAINTENANCE">점검 중</option>
                        <option value="INACTIVE">비활성화</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">비품 이미지</label>
                    <input type="file" name="imageFile" accept="image/*"
                           class="w-full rounded-lg border border-gray-300 px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-black/10">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">설명</label>
                <textarea name="description" rows="4"
                          class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-black/10"></textarea>
            </div>

            <div class="flex justify-end gap-2 pt-2">
                <button type="button"
                        onclick="closeModal('createModal')"
                        class="px-4 py-2 rounded-lg border border-gray-300 text-sm hover:bg-gray-50 transition">
                    취소
                </button>
                <button type="submit"
                        class="px-4 py-2 rounded-lg bg-black text-white text-sm hover:bg-gray-800 transition">
                    등록
                </button>
            </div>
        </form>
    </div>
</div>

<!-- 상세 모달 -->
<div id="detailModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4">
    <div class="bg-white w-full max-w-2xl rounded-2xl shadow-xl overflow-hidden">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
            <h3 class="text-lg font-semibold text-gray-900">비품 상세</h3>
            <button type="button" onclick="closeModal('detailModal')" class="text-gray-400 hover:text-gray-600">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <div class="p-6 space-y-5">
            <div class="w-full h-56 rounded-xl border border-gray-200 bg-gray-100 overflow-hidden flex items-center justify-center">
                <img id="detailImage" src="" alt="비품 이미지" class="w-full h-full object-cover hidden">
                <div id="detailImageEmpty" class="text-gray-400 flex flex-col items-center gap-2">
                    <i data-lucide="image-off" class="w-8 h-8"></i>
                    <span class="text-sm">등록된 이미지가 없습니다.</span>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <p class="text-sm text-gray-500 mb-1">비품명</p>
                    <p id="detailEquipmentName" class="text-base font-semibold text-gray-900"></p>
                </div>
                <div>
                    <p class="text-sm text-gray-500 mb-1">상태</p>
                    <p id="detailStatus" class="text-base text-gray-900"></p>
                </div>
                <div>
                    <p class="text-sm text-gray-500 mb-1">총 수량</p>
                    <p id="detailTotalStock" class="text-base text-gray-900"></p>
                </div>
                <div>
                    <p class="text-sm text-gray-500 mb-1">점검 기준 수량</p>
                    <p id="detailMaintenanceLimit" class="text-base text-gray-900"></p>
                </div>
                <div>
                    <p class="text-sm text-gray-500 mb-1">가격</p>
                    <p id="detailPrice" class="text-base text-gray-900"></p>
                </div>
                <div>
                    <p class="text-sm text-gray-500 mb-1">총 예약 수</p>
                    <p id="detailTotalReservations" class="text-base text-gray-900"></p>
                </div>
                <div class="md:col-span-2">
                    <p class="text-sm text-gray-500 mb-1">설명</p>
                    <p id="detailDescription" class="text-base text-gray-900 whitespace-pre-line"></p>
                </div>
                <div>
                    <p class="text-sm text-gray-500 mb-1">생성일</p>
                    <p id="detailCreatedAt" class="text-base text-gray-900"></p>
                </div>
                <div>
                    <p class="text-sm text-gray-500 mb-1">수정일</p>
                    <p id="detailUpdatedAt" class="text-base text-gray-900"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 수정 모달 -->
<div id="editModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4">
    <div class="bg-white w-full max-w-2xl rounded-2xl shadow-xl overflow-hidden">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
            <h3 class="text-lg font-semibold text-gray-900">비품 수정</h3>
            <button type="button" onclick="closeModal('editModal')" class="text-gray-400 hover:text-gray-600">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <form id="editForm" method="post" th:object="${modifyForm}" enctype="multipart/form-data" class="p-6 space-y-5">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <div th:if="${modifyErrorMessage != null}"
                 class="px-4 py-3 rounded-lg bg-red-50 text-red-600 text-sm"
                 th:text="${modifyErrorMessage}">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">비품명</label>
                    <input type="text" id="editEquipmentName" name="equipmentName"
                           class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-black/10">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">총 수량</label>
                    <input type="number" id="editTotalStock" name="totalStock" min="1"
                           class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-black/10">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">점검 기준 수량</label>
                    <input type="number" id="editMaintenanceLimit" name="maintenanceLimit" min="0"
                           class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-black/10">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">가격</label>
                    <input type="number" id="editPrice" name="price" step="1000" min="0"
                           class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-black/10">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">상태</label>
                <select id="editStatus" name="status"
                        class="w-full rounded-lg border border-gray-300 px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-black/10">
                    <option value="AVAILABLE">사용 가능</option>
                    <option value="MAINTENANCE">점검 중</option>
                    <option value="INACTIVE">비활성화</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">현재 이미지</label>

                <div class="w-40 h-28 rounded-lg border border-gray-200 bg-gray-100 overflow-hidden flex items-center justify-center">
                    <img id="editImagePreview"
                         src=""
                         alt="현재 비품 이미지"
                         class="w-full h-full object-cover hidden">

                    <div id="editImageEmpty" class="text-gray-400 flex flex-col items-center gap-1">
                        <i data-lucide="image-off" class="w-5 h-5"></i>
                        <span class="text-xs">등록된 이미지 없음</span>
                    </div>
                </div>

                <div class="mt-5">
                    <label class="block text-sm font-medium text-gray-700 mb-2">새 이미지 업로드</label>
                    <input type="file"
                           id="editImageFile"
                           name="imageFile"
                           accept="image/*"
                           class="w-full rounded-lg border border-gray-300 px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-black/10">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">설명</label>
                <textarea id="editDescription" name="description" rows="4"
                          class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-black/10"></textarea>
            </div>

            <div class="flex justify-end gap-2 pt-2">
                <button type="button"
                        onclick="closeModal('editModal')"
                        class="px-4 py-2 rounded-lg border border-gray-300 text-sm hover:bg-gray-50 transition">
                    취소
                </button>
                <button type="submit"
                        class="px-4 py-2 rounded-lg bg-black text-white text-sm hover:bg-gray-800 transition">
                    수정
                </button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    function formatPrice(value) {
        if (value == null || value === '') return '-';
        return Number(value).toLocaleString() + '원';
    }

    function markStatusChanged(select) {
        const originalStatus = select.dataset.originalStatus;
        const changed = select.value !== originalStatus;

        if (changed) {
            select.classList.remove('border-gray-300', 'bg-white');
            select.classList.add('border-blue-400', 'bg-blue-50');
        } else {
            select.classList.remove('border-blue-400', 'bg-blue-50');
            select.classList.add('border-gray-300', 'bg-white');
        }
    }

    function getStatusLabel(status) {
        switch (status) {
            case 'AVAILABLE': return '사용 가능';
            case 'MAINTENANCE': return '점검 중';
            case 'INACTIVE': return '비활성화';
            default: return status ?? '-';
        }
    }

    function openModal(id) {
        const modal = document.getElementById(id);
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    function closeModal(id) {
        const modal = document.getElementById(id);
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    function getEquipmentData(button) {
        const row = button.closest('tr');
        return {
            equipmentId: row.dataset.equipmentId,
            equipmentName: row.dataset.equipmentName || '',
            description: row.dataset.equipmentDescription || '',
            totalStock: row.dataset.equipmentTotalStock || '',
            maintenanceLimit: row.dataset.equipmentMaintenanceLimit || '',
            price: row.dataset.equipmentPrice || '',
            status: row.dataset.equipmentStatus || '',
            imageUrl: row.dataset.equipmentImageUrl || '',
            totalReservations: row.dataset.equipmentTotalReservations || '0',
            createdAt: row.dataset.equipmentCreatedAt || '-',
            updatedAt: row.dataset.equipmentUpdatedAt || '-'
        };
    }

    function openCreateModal() {
        openModal('createModal');
    }

    function openDetailModal(button) {
        const equipment = getEquipmentData(button);

        document.getElementById('detailEquipmentName').textContent = equipment.equipmentName;
        document.getElementById('detailStatus').textContent = getStatusLabel(equipment.status);
        document.getElementById('detailTotalStock').textContent = equipment.totalStock ? equipment.totalStock + '개' : '-';
        document.getElementById('detailMaintenanceLimit').textContent = equipment.maintenanceLimit ? equipment.maintenanceLimit + '개' : '-';
        document.getElementById('detailPrice').textContent = formatPrice(equipment.price);
        document.getElementById('detailDescription').textContent = equipment.description || '-';
        document.getElementById('detailTotalReservations').textContent = equipment.totalReservations + '건';
        document.getElementById('detailCreatedAt').textContent = equipment.createdAt;
        document.getElementById('detailUpdatedAt').textContent = equipment.updatedAt;

        const image = document.getElementById('detailImage');
        const empty = document.getElementById('detailImageEmpty');

        if (equipment.imageUrl && equipment.imageUrl.trim() !== '') {
            image.src = equipment.imageUrl;
            image.classList.remove('hidden');
            empty.classList.add('hidden');
        } else {
            image.src = '';
            image.classList.add('hidden');
            empty.classList.remove('hidden');
        }

        openModal('detailModal');
    }

    function openEditModal(button) {
        const equipment = getEquipmentData(button);

        document.getElementById('editForm').action = '/admin/equipments/' + equipment.equipmentId + '/edit';
        document.getElementById('editEquipmentName').value = equipment.equipmentName;
        document.getElementById('editDescription').value = equipment.description;
        document.getElementById('editTotalStock').value = equipment.totalStock;
        document.getElementById('editMaintenanceLimit').value = equipment.maintenanceLimit;
        document.getElementById('editPrice').value = equipment.price;
        document.getElementById('editStatus').value = equipment.status;

        const preview = document.getElementById('editImagePreview');
        const empty = document.getElementById('editImageEmpty');
        const fileInput = document.getElementById('editImageFile');

        fileInput.value = '';

        if (equipment.imageUrl && equipment.imageUrl.trim() !== '') {
            preview.src = equipment.imageUrl;
            preview.classList.remove('hidden');
            empty.classList.add('hidden');
        } else {
            preview.src = '';
            preview.classList.add('hidden');
            empty.classList.remove('hidden');
        }

        openModal('editModal');
    }

    document.addEventListener('click', function (e) {
        ['detailModal'].forEach(function (id) {
            const modal = document.getElementById(id);
            if (e.target === modal) {
                closeModal(id);
            }
        });
    });

    window.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
            ['createModal', 'detailModal', 'editModal'].forEach(closeModal);
        }
    });

    document.addEventListener('DOMContentLoaded', function () {
        lucide.createIcons();

        const openCreateModalFlag = /*[[${openCreateModal}]]*/ false;
        const openModifyModalFlag = /*[[${openModifyModal}]]*/ false;
        const modifyTargetId = /*[[${modifyTargetId}]]*/ null;

        if (openCreateModalFlag) {
            openCreateModal();
        }

        if (openModifyModalFlag && modifyTargetId != null) {
            const targetRow = document.querySelector(`tr[data-equipment-id="${modifyTargetId}"]`);
            if (targetRow) {
                const editButton = targetRow.querySelector('button[onclick="openEditModal(this)"]');
                if (editButton) {
                    openEditModal(editButton);
                }
            }
        }
    });
</script>
</body>
</html>
