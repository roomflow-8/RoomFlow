<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>정책 관리 | RoomFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" th:href="@{/images/logo_tmp.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-gray-50 min-h-screen">
<div th:replace="~{fragments/header :: header}"></div>
<th:block th:replace="~{fragments/alert-script :: alertScript}"></th:block>

<div class="flex min-h-screen">
    <div th:replace="~{fragments/admin-sidebar :: adminSidebar('system')}"></div>

    <main class="flex-1 p-6 md:p-8">
        <div th:replace="~{admin/system/system-tabs :: systemTabs('policies')}"></div>

        <section class="mt-6">
            <div class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden">
                <div class="px-6 py-5 border-b border-gray-200 flex items-center justify-between">
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">정책 관리</h1>
                        <p class="text-sm text-gray-500 mt-1">
                            예약 및 비품 운영에 필요한 정책 값을 관리합니다.
                        </p>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="min-w-full table-fixed">
                        <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700 w-[20%]">정책명</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700 w-[18%]">입력 기준</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700 w-[22%]">정책 값</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-700 w-[12%]">수정일</th>
                            <th class="px-6 py-4 text-center text-sm font-semibold text-gray-700 w-[10%]">관리</th>
                        </tr>
                        </thead>

                        <tbody class="divide-y divide-gray-100">
                        <tr th:if="${#lists.isEmpty(policies)}">
                            <td colspan="6" class="px-6 py-14 text-center text-sm text-gray-500">
                            </td>
                        </tr>

                        <tr th:each="policy : ${policies}" class="hover:bg-gray-50 transition">

                            <td class="px-6 py-5 align-middle">
                                <p class="text-sm text-gray-600 leading-relaxed"
                                   th:text="${policy.description}">
                                </p>
                            </td>

                            <td class="px-6 py-5 align-middle">
                                <span class="inline-flex items-center rounded-full bg-gray-100 px-3 py-1 text-xs font-medium text-gray-700"
                                      th:text="${policy.policyGuide}">
                                </span>
                            </td>

                            <td class="px-6 py-5 align-middle">
                                <form th:action="@{/admin/policies/{policyId}/edit(policyId=${policy.policyId})}"
                                      method="post"
                                      class="flex items-center gap-2">

                                    <input type="hidden"
                                           th:name="${_csrf.parameterName}"
                                           th:value="${_csrf.token}">

                                    <input type="${policy.inputType}"
                                           name="policyValue"
                                           th:value="${policy.policyValue}"
                                           class="w-full min-w-[140px] rounded-xl border border-gray-300 bg-white px-4 py-2.5 text-sm text-gray-800 shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none"/>

                                    <button type="submit"
                                            class="shrink-0 inline-flex items-center justify-center rounded-xl bg-gray-900 px-4 py-2.5 text-sm font-semibold text-white hover:bg-gray-800 transition">
                                        저장
                                    </button>
                                </form>
                            </td>

                            <td class="px-6 py-5 align-middle">
                                <span class="text-sm text-gray-500"
                                      th:text="${policy.updatedAt}">
                                </span>
                            </td>

                            <td class="px-6 py-5 align-middle text-center">
                                <span class="inline-flex items-center rounded-full bg-blue-50 px-3 py-1 text-xs font-semibold text-blue-700">
                                    수정 가능
                                </span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 안내 카드 -->
            <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-5">
                    <h2 class="text-sm font-semibold text-gray-900 mb-2">운영 안내</h2>
                    <p class="text-sm text-gray-600 leading-relaxed">
                        정책 값 변경 시 예약 가능 시간, 슬롯 생성 범위, 비품 제한 수량 등에 즉시 영향을 줄 수 있습니다.
                        운영 중인 정책은 변경 전 영향 범위를 확인한 뒤 수정해주세요.
                    </p>
                </div>

                <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-5">
                    <h2 class="text-sm font-semibold text-gray-900 mb-2">수정 주의사항</h2>
                    <p class="text-sm text-gray-600 leading-relaxed">
                        예약 시작 가능 시간은 종료 가능 시간보다 빨라야 하며,
                        슬롯 단위와 오픈 기간은 시스템 스케줄링 및 예약 화면에 함께 반영됩니다.
                    </p>
                </div>
            </div>
        </section>
    </main>
</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
