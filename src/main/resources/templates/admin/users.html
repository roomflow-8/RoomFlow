<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 관리 - RoomFlow</title>
    <link rel="icon" type="image/png" th:href="@{/images/logo_tmp.png}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-gray-50">
<div th:replace="~{fragments/header :: header}"></div>

<div class="flex w-full">
    <div th:replace="~{fragments/admin-sidebar :: adminSidebar('users')}"></div>

    <main class="flex-1 p-6 space-y-6">

        <!-- 페이지 타이틀 -->
        <div>
            <h1 class="text-2xl font-bold text-gray-900">회원 관리</h1>
            <p class="text-sm text-gray-500 mt-1">전체 회원 목록 및 탈퇴 대기 회원을 관리합니다</p>
        </div>

        <!-- 성공/에러 메시지 -->
        <div th:if="${successMsg}" class="bg-green-50 border border-green-200 text-green-800 rounded-lg px-4 py-3 text-sm"
             th:text="${successMsg}"></div>
        <div th:if="${errorMsg}" class="bg-red-50 border border-red-200 text-red-800 rounded-lg px-4 py-3 text-sm"
             th:text="${errorMsg}"></div>

        <!-- 탭 + 검색 -->
        <div class="flex items-center justify-between gap-4">

            <!-- 탭 -->
            <div class="flex gap-1 bg-gray-100 rounded-lg p-1">
                <a th:href="@{/admin/users}"
                   th:classappend="${tab != 'pending'} ? 'bg-white shadow text-gray-900 font-medium' : 'text-gray-500 hover:text-gray-700'"
                   class="px-4 py-2 rounded-md text-sm transition">
                    전체 회원
                </a>
                <a th:href="@{/admin/users/deleted}"
                   th:classappend="${tab == 'pending'} ? 'bg-white shadow text-gray-900 font-medium' : 'text-gray-500 hover:text-gray-700'"
                   class="px-4 py-2 rounded-md text-sm transition">
                    탈퇴 대기
                </a>
            </div>

            <!-- 검색 -->
            <form th:action="@{/admin/users/search}" method="get" class="flex gap-2">
                <input type="text" name="keyword" th:value="${keyword}"
                       placeholder="이름 또는 이메일 검색"
                       class="border border-gray-300 rounded-lg px-3 py-2 text-sm w-64 focus:outline-none focus:ring-2 focus:ring-gray-400">
                <button type="submit"
                        class="bg-gray-900 text-white text-sm px-4 py-2 rounded-lg hover:bg-gray-700 transition">
                    검색
                </button>
                <!-- 검색어 있을 때 초기화 버튼 -->
                <a th:if="${keyword != null and !keyword.isEmpty()}"
                   th:href="@{/admin/users}"
                   class="border border-gray-300 text-gray-600 text-sm px-4 py-2 rounded-lg hover:bg-gray-50 transition">
                    초기화
                </a>
            </form>
        </div>

        <!-- 회원 수 요약 -->
        <p class="text-sm text-gray-500">
            총 <span class="font-semibold text-gray-900" th:text="${users.size()}">0</span>명
            <span th:if="${keyword != null and !keyword.isEmpty()}"
                  th:text="'  (' + ${keyword} + ' 검색 결과)'"></span>
        </p>

        <!-- 회원 테이블 -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="text-left px-5 py-3 text-gray-600 font-medium">ID</th>
                            <th class="text-left px-5 py-3 text-gray-600 font-medium">이름</th>
                            <th class="text-left px-5 py-3 text-gray-600 font-medium">이메일</th>
                            <th class="text-left px-5 py-3 text-gray-600 font-medium">권한</th>
                            <th class="text-left px-5 py-3 text-gray-600 font-medium">가입일</th>
                            <th class="text-left px-5 py-3 text-gray-600 font-medium">예약</th>
                            <th class="text-left px-5 py-3 text-gray-600 font-medium">취소</th>
                            <th class="text-left px-5 py-3 text-gray-600 font-medium">상태</th>
                            <th class="text-right px-5 py-3 text-gray-600 font-medium">작업</th>
                            <!-- 탈퇴 대기 탭에서만 남은 일수 컬럼 표시 -->
                            <th th:if="${tab == 'pending'}" class="text-left px-5 py-3 text-gray-600 font-medium">남은 일수</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <tr th:each="user : ${users}" class="hover:bg-gray-50 transition">
                            <td class="px-5 py-4 text-gray-500" th:text="${user.userId}"></td>
                            <td class="px-5 py-4 font-medium text-gray-900" th:text="${user.name}"></td>

                            <!-- 이메일 클릭 시 메일 전송 모달 오픈 -->
                            <td class="px-5 py-4">
                                <span th:text="${user.email}"
                                      th:attr="onclick='openEmailModal(' + ${user.userId} + ', \'' + ${user.email} + '\')'"
                                      class="text-blue-600 hover:underline cursor-pointer"></span>
                            </td>

                            <!-- 권한 배지 -->
                            <td class="px-5 py-4">
                                <span th:if="${user.role == 'ADMIN'}"
                                      class="bg-purple-100 text-purple-800 text-xs font-medium px-2.5 py-1 rounded-full">관리자</span>
                                <span th:if="${user.role == 'USER'}"
                                      class="bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-1 rounded-full">일반</span>
                            </td>

                            <!-- 가입일 -->
                            <td class="px-5 py-4 text-gray-600"
                                th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}"></td>

                            <!-- 예약/취소 건수 -->
                            <td class="px-5 py-4 text-gray-900 font-medium" th:text="${user.reservationCount + '건'}"></td>
                            <td class="px-5 py-4 text-red-600 font-medium" th:text="${user.cancelCount + '건'}"></td>

                            <!-- 상태 배지 -->
                            <td class="px-5 py-4">
                                <span th:if="${!user.pendingDelete}"
                                      class="bg-green-100 text-green-800 text-xs font-medium px-2.5 py-1 rounded-full">정상</span>
                                <span th:if="${user.pendingDelete}"
                                      class="bg-red-100 text-red-800 text-xs font-medium px-2.5 py-1 rounded-full">탈퇴 대기</span>
                            </td>

                            <!-- 작업 버튼 (탈퇴 대기 탭에서는 즉시 삭제 추가) -->
                            <td class="px-5 py-4 text-right">
                                <div class="flex items-center justify-end gap-2">
                                    <!-- 이메일 전송 버튼 -->
                                    <button th:attr="onclick='openEmailModal(' + ${user.userId} + ', \'' + ${user.email} + '\')'"
                                            class="border border-gray-300 text-blue-600 text-xs px-3 py-1.5 rounded-md hover:bg-blue-50 transition">
                                        메일 전송
                                    </button>
                                    <!-- 탈퇴 대기 탭에서만 즉시 삭제 버튼 -->
                                    <form th:if="${tab == 'pending'}"
                                          th:action="@{/admin/users/{userId}/forcedelete(userId=${user.userId})}"
                                          method="post"
                                          onsubmit="return confirm('정말 즉시 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')">
                                        <button type="submit"
                                                class="border border-gray-300 text-red-600 text-xs px-3 py-1.5 rounded-md hover:bg-red-50 transition">
                                            즉시 삭제
                                        </button>
                                    </form>
                                </div>
                            </td>

                            <!-- 탈퇴 대기 탭에서만 남은 일수 표시 -->
                            <td th:if="${tab == 'pending'}" class="px-5 py-4">
                                <span th:text="${user.remainingDays() + '일'}"
                                      class="text-orange-600 font-medium"></span>
                            </td>
                        </tr>

                        <!-- 데이터 없을 때 -->
                        <tr th:if="${users.isEmpty()}">
                            <td colspan="10" class="px-5 py-12 text-center text-gray-400 text-sm">
                                조회된 회원이 없습니다.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
</div>

<!-- 이메일 전송 모달 -->
<div id="emailModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6 space-y-4">
        <div>
            <h3 class="text-lg font-semibold text-gray-900">이메일 전송</h3>
            <p id="modalEmail" class="text-sm text-gray-500 mt-1"></p>
        </div>

        <form id="emailForm" method="post">
            <!-- CSRF 토큰 -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">제목</label>
                    <input type="text" name="subject" required
                           placeholder="이메일 제목을 입력하세요"
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">내용</label>
                    <textarea name="content" rows="5" required
                              placeholder="이메일 내용을 입력하세요"
                              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400 resize-none"></textarea>
                </div>
            </div>
            <div class="flex justify-end gap-2 pt-4">
                <button type="button" onclick="closeEmailModal()"
                        class="border border-gray-300 text-gray-600 text-sm px-4 py-2 rounded-lg hover:bg-gray-50 transition">
                    취소
                </button>
                <button type="submit"
                        class="bg-gray-900 text-white text-sm px-4 py-2 rounded-lg hover:bg-gray-700 transition">
                    전송
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // 이메일 모달 열기 - userId와 email을 받아서 폼 action 설정
    function openEmailModal(userId, email) {
        document.getElementById('modalEmail').textContent = '수신자: ' + email;
        document.getElementById('emailForm').action = '/admin/users/' + userId + '/email';
        document.getElementById('emailModal').classList.remove('hidden');
    }

    // 이메일 모달 닫기
    function closeEmailModal() {
        document.getElementById('emailModal').classList.add('hidden');
        document.getElementById('emailForm').reset();
    }

    // 모달 바깥 클릭 시 닫기
    document.getElementById('emailModal').addEventListener('click', function(e) {
        if (e.target === this) closeEmailModal();
    });
</script>

</body>
</html>
