<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="card(room, selectedDate)" class="room-card bg-white rounded-xl border p-6"
     th:classappend="${room.status.name() != 'AVAILABLE'} ? ' opacity-50'">

    <!-- 상단: 이미지 + 기본 정보 -->
    <div class="flex gap-6">
        <div class="w-[120px] h-[90px] bg-gray-100 rounded-lg overflow-hidden flex items-center justify-center shrink-0">
            <img th:if="${room.imageUrl != null and !#strings.isEmpty(room.imageUrl)}"
                 th:src="${room.imageUrl}"
                 alt="회의실 이미지"
                 class="w-full h-full object-cover">

            <span th:unless="${room.imageUrl != null and !#strings.isEmpty(room.imageUrl)}"
                  class="text-gray-400 text-sm">
                ROOM
            </span>
        </div>

        <div class="flex-1">
            <div class="flex items-center gap-3 mb-2">
                <h3 class="text-lg font-semibold" th:text="${room.roomName}"></h3>

                <span th:if="${room.statusMessage != null}"
                      th:text="${room.statusMessage}"
                      th:class="
                        ${room.statusMessage == '예약 가능'} ? 'text-xs px-2 py-1 bg-green-100 text-green-700 rounded' :
                        (${room.statusMessage == '점검 중'} ? 'text-xs px-2 py-1 bg-yellow-100 text-yellow-700 rounded' :
                        'text-xs px-2 py-1 bg-gray-200 text-gray-700 rounded')
                      ">
                </span>
            </div>

            <p class="text-sm text-gray-600 mb-1">
                <span th:text="${room.capacity}"></span>인실 ·
                <span th:text="${room.priceText()}"></span>
            </p>

            <p class="text-xs text-gray-500">
                예약 <span class="font-medium" th:text="${room.totalReservations}"></span>회
            </p>

            <p class="text-sm text-gray-500 mt-2 leading-relaxed"
               th:text="${room.description}">
            </p>
        </div>
    </div>

    <!-- 하단: 예약 영역 -->
    <div class="mt-4 pt-4 border-t border-gray-100">
        <button type="button"
                class="text-sm text-gray-500 hover:text-black"
                onclick="toggleRoom(this)">
            시간 선택 ▼
        </button>

        <div class="room-detail hidden mt-3" th:if="${room.status.name() == 'AVAILABLE'}">
            <form method="post" th:action="@{/reservations}" class="reservation-form">
                <input type="hidden" name="roomId" th:value="${room.roomId}">
                <input type="hidden" name="date" th:value="${selectedDate}">
                <input type="hidden" name="idempotencyKey" th:value="${T(java.util.UUID).randomUUID().toString()}">

                <div class="mb-3">
                    <div th:if="${room.roomSlots != null and !#lists.isEmpty(room.roomSlots)}"
                         class="flex flex-wrap gap-2">
                        <label th:each="time : ${room.roomSlots}">
                            <input type="checkbox"
                                   name="roomSlotIds"
                                   th:value="${time.roomSlotId()}"
                                   class="hidden peer"
                                   th:disabled="${!time.isActive}" />

                            <span th:text="${time.timeRange()}"
                                  th:class="${!time.isActive} ?
                                    'w-[130px] px-4 py-2 text-sm font-medium rounded-lg border flex items-center justify-center bg-gray-200 text-gray-700 border-gray-300 cursor-not-allowed' :
                                    'w-[130px] px-4 py-2 text-sm font-medium rounded-lg border flex items-center justify-center bg-white text-gray-700 border-gray-300 hover:bg-gray-100 cursor-pointer peer-checked:bg-black peer-checked:text-white peer-checked:border-black'">
                            </span>
                        </label>
                    </div>

                    <p th:if="${room.roomSlots == null or #lists.isEmpty(room.roomSlots)}"
                       class="text-sm text-gray-500">
                        예약 가능한 시간대가 없습니다.
                    </p>
                </div>

                <button type="submit"
                        class="px-4 py-2 rounded-lg text-sm"
                        th:disabled="${room.statusMessage == '예약 마감'}"
                        th:classappend="${room.statusMessage == '예약 마감'} ?
                            ' bg-gray-300 text-gray-500 cursor-not-allowed' :
                            ' bg-black text-white hover:bg-gray-700'">
                    예약하기
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
