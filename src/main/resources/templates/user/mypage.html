<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - RoomFlow</title>
    <link rel="icon" type="image/png" th:href="@{/images/logo_tmp.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="min-h-screen bg-gray-50">

<!-- 공통 헤더 -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- 페이지 타이틀 -->
<div class="bg-white border-b border-gray-200">
    <div class="max-w-4xl mx-auto px-6 py-6">
        <h1 class="text-3xl font-bold text-gray-900">마이페이지</h1>
        <p class="text-sm text-gray-600 mt-2">회원 정보를 관리하세요</p>
    </div>
</div>

<main class="max-w-4xl mx-auto px-6 py-8 space-y-6">

    <!-- 전역 성공/에러 메시지 -->
    <div class="rounded-md border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-700" th:if="${successMsg}" th:text="${successMsg}"></div>
    <div class="rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600" th:if="${errorMsg}" th:text="${errorMsg}"></div>

    <!-- 회원 정보 카드 -->
    <div class="rounded-xl border border-gray-200 bg-white overflow-hidden shadow-sm">
        <div class="px-6 py-5 border-b border-gray-100">
            <div class="flex items-center gap-2 text-base font-semibold text-gray-900">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                회원 정보
            </div>
            <p class="text-sm text-gray-500 mt-1">기본 정보를 확인하고 수정할 수 있습니다</p>
        </div>
        <div class="p-6 space-y-4">

            <!-- 이메일 (수정 불가) -->
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">이메일</label>
                <input type="email" th:value="${loginUser.email}" disabled class="flex w-full h-[44px] rounded-md border border-slate-300 bg-gray-100 px-3 py-2 text-sm text-slate-600 outline-none" />
                <span class="text-xs text-gray-500">이메일은 변경할 수 없습니다</span>
            </div>

            <!-- 이름 변경 -->
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">이름</label>
                <div class="alert alert-success" th:if="${successMsg}" style="display:none;"></div>
                <form th:action="@{/users/mypage/name}" method="post" id="nameForm">
                    <div class="flex gap-2">
                        <input type="text" name="name" id="nameInput"
                               th:value="${loginUser.name}"
                               disabled
                               class="flex-1 h-[44px] rounded-md border border-slate-300 bg-gray-100 px-3 py-2 text-sm text-slate-700 outline-none focus:border-slate-900 disabled:text-slate-600" />
                        <button type="button" class="inline-flex items-center justify-center h-[44px] px-4 rounded-md border border-slate-300 bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors" id="editNameBtn" onclick="toggleNameEdit()">수정</button>
                        <button type="submit" class="inline-flex items-center justify-center h-[44px] px-4 rounded-md bg-slate-900 text-sm font-medium text-white hover:bg-slate-800 transition-colors" id="saveNameBtn" style="display:none;">저장</button>
                        <button type="button" class="inline-flex items-center justify-center h-[44px] px-4 rounded-md border border-slate-300 bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors" id="cancelNameBtn" style="display:none;" onclick="cancelNameEdit()">취소</button>
                    </div>
                </form>
            </div>

        </div>
    </div>

    <!-- 비밀번호 변경 카드 -->
    <div class="rounded-xl border border-gray-200 bg-white overflow-hidden shadow-sm">
        <div class="px-6 py-5 border-b border-gray-100">
            <div class="flex items-center gap-2 text-base font-semibold text-gray-900">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                비밀번호 변경
            </div>
            <p class="text-sm text-gray-500 mt-1">현재 비밀번호를 확인 후 새 비밀번호로 변경할 수 있습니다</p>
        </div>
        <div class="p-6 space-y-4">
            <div class="rounded-md border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-700" th:if="${passwordSuccess}" th:text="${passwordSuccess}"></div>
            <div class="rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600" th:if="${passwordError}" th:text="${passwordError}"></div>

            <form th:action="@{/users/mypage/password}" method="post">
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">현재 비밀번호</label>
                    <input type="password" name="currentPassword" placeholder="현재 비밀번호를 입력하세요" required class="flex w-full h-[44px] rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 outline-none placeholder:text-slate-400 focus:border-slate-900" />
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">새 비밀번호</label>
                    <input type="password" name="newPassword" placeholder="영문, 숫자, 특수문자 포함 8자 이상" required class="flex w-full h-[44px] rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 outline-none placeholder:text-slate-400 focus:border-slate-900" />
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">새 비밀번호 확인</label>
                    <input type="password" name="newPasswordConfirm" placeholder="새 비밀번호를 다시 입력하세요" required class="flex w-full h-[44px] rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 outline-none placeholder:text-slate-400 focus:border-slate-900" />
                </div>
                <button type="submit" class="mt-2 inline-flex items-center justify-center h-[44px] px-4 rounded-md bg-slate-900 text-sm font-medium text-white hover:bg-slate-800 transition-colors">비밀번호 변경</button>
            </form>
        </div>
    </div>

    <!-- 회원 탈퇴 카드 -->
    <div class="rounded-xl border border-red-200 bg-white overflow-hidden shadow-sm">
        <div class="px-6 py-5 border-b border-gray-100">
            <div class="flex items-center gap-2 text-base font-semibold text-red-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                    <path d="M10 11v6"/>
                    <path d="M14 11v6"/>
                    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
                회원 탈퇴
            </div>
            <p class="text-sm text-gray-500 mt-1">계정을 삭제하면 모든 데이터가 영구적으로 삭제됩니다</p>
        </div>
        <div class="p-6 space-y-4">
            <button type="button" class="inline-flex items-center justify-center h-[44px] px-4 rounded-md bg-red-600 text-sm font-medium text-white hover:bg-red-700 transition-colors" onclick="openDeleteModal()">회원 탈퇴</button>
        </div>
    </div>

</main>

<!-- 회원 탈퇴 확인 모달 -->
<div class="hidden fixed inset-0 z-[100] items-center justify-center bg-black/40" id="deleteModal">
    <div class="w-full max-w-md rounded-xl bg-white p-7 shadow-2xl">
        <h2 class="text-lg font-bold text-gray-900 mb-2">정말 탈퇴하시겠습니까?</h2>
        <p class="text-sm text-gray-500 leading-6 mb-5">회원 탈퇴 시 모든 예약 내역과 개인정보가 영구적으로 삭제되며, 복구할 수 없습니다. 이 작업은 되돌릴 수 없습니다.</p>
        <div class="flex justify-end gap-2">
            <button type="button" class="inline-flex items-center justify-center h-[44px] px-4 rounded-md border border-slate-300 bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors" onclick="closeDeleteModal()">취소</button>
            <form th:action="@{/users/mypage/delete}" method="post" class="inline">
                <button type="submit" class="inline-flex items-center justify-center h-[44px] px-4 rounded-md bg-red-600 text-sm font-medium text-white hover:bg-red-700 transition-colors">탈퇴하기</button>
            </form>
        </div>
    </div>
</div>

<script>
    // 이름 수정 토글
    function toggleNameEdit() {
        const nameInput = document.getElementById('nameInput');
        nameInput.disabled = false;
        nameInput.classList.remove('bg-gray-100');
        nameInput.classList.add('bg-white');
        nameInput.focus();
        document.getElementById('editNameBtn').style.display = 'none';
        document.getElementById('saveNameBtn').style.display = 'inline-block';
        document.getElementById('cancelNameBtn').style.display = 'inline-block';
    }

    function cancelNameEdit() {
        const nameInput = document.getElementById('nameInput');
        nameInput.disabled = true;
        nameInput.classList.remove('bg-white');
        nameInput.classList.add('bg-gray-100');
        document.getElementById('editNameBtn').style.display = 'inline-block';
        document.getElementById('saveNameBtn').style.display = 'none';
        document.getElementById('cancelNameBtn').style.display = 'none';
    }

    // 회원 탈퇴 모달
    function openDeleteModal() {
        const modal = document.getElementById('deleteModal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    function closeDeleteModal() {
        const modal = document.getElementById('deleteModal');
        modal.classList.remove('flex');
        modal.classList.add('hidden');
    }

    // 모달 바깥 클릭 시 닫기
    document.getElementById('deleteModal').addEventListener('click', function(e) {
        if (e.target === this) closeDeleteModal();
    });
</script>

</body>
</html>
