<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center px-4">

<div class="w-full max-w-[420px] rounded-xl border border-gray-200 bg-white p-8 shadow-sm">
    <div class="text-center mb-6">
        <img th:src="@{/images/logo_tmp.png}" alt="RoomFlow 로고" class="w-16 h-16 object-contain mx-auto mb-3">
        <h1 class="text-2xl font-bold text-gray-900 mb-1.5">로그인</h1>
        <p class="text-sm text-gray-500">회의실 예약 시스템에 로그인하세요</p>
    </div>

    <!-- 로그인 폼 → POST /users/login → SecurityConfig formLogin 이 처리 -->
    <form th:action="@{/users/login}" method="post">

        <!-- 로그인 실패 메시지 -->
        <div class="mb-4 rounded-lg border border-red-200 bg-red-50 px-3 py-2.5 text-center text-[13px] text-red-600" th:if="${errorMsg}" th:text="${errorMsg}"></div>

        <div class="mb-4">
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">아이디</label>
            <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required class="w-full h-[50px] rounded-lg border border-gray-300 px-3 text-sm text-gray-900 outline-none transition-colors placeholder:text-gray-400 focus:border-gray-900" />
        </div>

        <div class="mb-4">
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required class="w-full h-[50px] rounded-lg border border-gray-300 px-3 text-sm text-gray-900 outline-none transition-colors placeholder:text-gray-400 focus:border-gray-900" />
        </div>

        <button type="submit" class="mb-5 h-[50px] w-full rounded-lg bg-gray-900 text-base font-semibold text-white transition-colors hover:bg-gray-700">로그인</button>
    </form>

    <div class="mb-5 flex items-center gap-3">
        <hr class="flex-1 border-0 border-t border-gray-200" />
        <span class="whitespace-nowrap text-[11px] uppercase tracking-[0.05em] text-gray-400">또는</span>
        <hr class="flex-1 border-0 border-t border-gray-200" />
    </div>

    <!-- 소셜 로그인 버튼 -->
    <div class="mb-5 grid grid-cols-3 gap-3">
        <!-- Google -->
        <a th:href="@{/oauth2/authorization/google}" class="flex h-[50px] items-center justify-center rounded-lg border border-gray-300 bg-white transition-opacity hover:opacity-85">
            <svg class="h-5 w-5" viewBox="0 0 24 24">
                <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
        </a>

        <!-- Kakao -->
        <a th:href="@{/oauth2/authorization/kakao}" class="flex h-[50px] items-center justify-center rounded-lg border border-[#FEE500] bg-[#FEE500] transition-opacity hover:opacity-85">
            <svg class="h-5 w-5" viewBox="0 0 24 24">
                <path fill="#000000" d="M12 3C6.48 3 2 6.48 2 10.8c0 2.7 1.68 5.1 4.26 6.54-.18.66-.72 2.64-.84 3.06-.12.48.18.48.36.36.18-.12 2.82-1.92 3.24-2.22.6.12 1.26.18 1.98.18 5.52 0 10-3.48 10-7.8S17.52 3 12 3z"/>
            </svg>
        </a>

        <!-- Naver -->
        <a th:href="@{/oauth2/authorization/naver}" class="flex h-[50px] items-center justify-center rounded-lg border border-[#03C75A] bg-[#03C75A] transition-opacity hover:opacity-85">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="white">
                <path d="M16.273 12.845 7.376 0H0v24h7.726V11.156L16.624 24H24V0h-7.727v12.845Z"/>
            </svg>
        </a>
    </div>

    <div class="mb-3 text-center text-[13px] text-gray-500">
        계정이 없으신가요? <a th:href="@{/users/signup}" class="font-semibold text-gray-900 no-underline hover:underline">회원가입</a>
    </div>

    <a th:href="@{/rooms}" class="block">
        <button type="button" class="h-10 w-full rounded-lg border-0 bg-transparent text-sm text-gray-500 transition-colors hover:bg-gray-100">홈으로 돌아가기</button>
    </a>
</div>

</body>
</html>
