<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 예약 목록 - RoomFlow</title>
    <link rel="icon" type="image/png" th:href="@{/images/logo_tmp.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="min-h-screen bg-gray-50">

<div th:replace="~{fragments/header :: header}"></div>
<th:block th:replace="~{fragments/alert-script :: alertScript}"></th:block>
<!-- 페이지 헤더 -->
<div class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-6 py-6">
        <h1 class="text-3xl font-bold text-gray-900">내 예약 목록</h1>
        <p class="text-gray-600 mt-2">회의실 예약 내역을 확인하세요</p>
    </div>
</div>

<main class="max-w-7xl mx-auto px-6 py-8">

    <!-- 탭 필터 -->
    <div class="mb-6 flex items-center gap-3">
        <a th:href="@{/users/reservationlist(tab='upcoming')}"
           th:classappend="${activeTab == 'upcoming'} ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-50'"
           class="inline-flex items-center justify-center h-[40px] px-4 rounded-md border text-sm font-medium transition-colors">
            예정된 예약
        </a>
        <a th:href="@{/users/reservationlist(tab='completed')}"
           th:classappend="${activeTab == 'completed'} ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-50'"
           class="inline-flex items-center justify-center h-[40px] px-4 rounded-md border text-sm font-medium transition-colors">
            완료된 예약
        </a>
        <a th:href="@{/users/reservationlist(tab='cancelled')}"
           th:classappend="${activeTab == 'cancelled'} ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-50'"
           class="inline-flex items-center justify-center h-[40px] px-4 rounded-md border text-sm font-medium transition-colors">
            취소된 예약
        </a>
    </div>

    <!-- 날짜 필터 -->
    <form th:action="@{/users/reservationlist}" method="get"
          class="mb-6 flex items-center gap-3 bg-white p-4 rounded-lg border border-gray-200 flex-wrap">
        <input type="hidden" name="tab" th:value="${activeTab}">
        <span class="text-sm font-medium text-gray-700">기간 검색:</span>
        <input type="date" name="startDate" th:value="${startDate}"
               class="h-[40px] rounded-md border border-slate-300 bg-white px-3 text-sm text-slate-900 outline-none focus:border-slate-900" />
        <span class="text-gray-500">~</span>
        <input type="date" name="endDate" th:value="${endDate}"
               class="h-[40px] rounded-md border border-slate-300 bg-white px-3 text-sm text-slate-900 outline-none focus:border-slate-900" />
        <button type="submit"
                class="inline-flex items-center justify-center h-[40px] px-4 rounded-md border border-slate-300 bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
            적용
        </button>
        <a th:href="@{/users/reservationlist(tab=${activeTab})}"
           class="inline-flex items-center justify-center h-[40px] px-4 rounded-md text-sm font-medium text-slate-600 hover:bg-slate-100 transition-colors">
            초기화
        </a>
    </form>

    <!-- 예약 없음 -->
    <div th:if="${#lists.isEmpty(reservations)}"
         class="rounded-xl border border-gray-200 bg-white shadow-sm">
        <div class="py-16 text-center text-gray-500">
            <p class="text-lg mb-4">예약 내역이 없습니다</p>
            <a th:href="@{/rooms}"
               class="inline-flex items-center justify-center h-[44px] px-6 rounded-md bg-slate-900 text-sm font-medium text-white hover:bg-slate-800 transition-colors">
                회의실 예약하기
            </a>
        </div>
    </div>

    <!-- 예약 목록 -->
    <div th:unless="${#lists.isEmpty(reservations)}" class="space-y-4">
        <div th:each="reservation : ${reservations}"
             class="rounded-xl border border-gray-200 bg-white shadow-sm hover:shadow-lg transition-shadow overflow-hidden">

            <!-- 카드 헤더 -->
            <div class="px-6 py-5 border-b border-gray-100">
                <div class="flex items-center justify-between flex-wrap gap-3">
                    <div class="flex items-center gap-2 flex-wrap">
                        <h2 class="text-xl font-semibold text-gray-900" th:text="${reservation.roomName}">회의실 이름</h2>
                        <!-- 비품이 있을 때만 배지 표시 -->
                        <span th:if="${reservation.equipments != null and !reservation.equipments.isEmpty()}"
                              class="inline-flex items-center gap-1 text-xs font-medium px-2 py-1 rounded-full bg-blue-100 text-blue-700">
                            비품 대여 중
                        </span>
                    </div>
                    <!-- 예정된 예약에만 비품 추가하기 버튼 -->
                    <a th:if="${activeTab == 'upcoming' and (reservation.equipments == null or reservation.equipments.isEmpty())}"
                       th:href="@{/reservations/{id}/equipments(id=${reservation.reservationId})}"
                       class="inline-flex items-center gap-1 justify-center h-[36px] px-4 rounded-md border border-slate-300 bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
                        비품 추가하기
                    </a>
                </div>
                <p class="text-sm text-gray-400 mt-1">
                    예약일: <span th:text="${reservation.createdAt != null ? #temporals.format(reservation.createdAt, 'yyyy-MM-dd HH:mm') : '-'}">-</span>
                </p>
            </div>

            <!-- 카드 본문 -->
            <div class="px-6 py-6">

                <!-- 날짜 / 시간 / 예약자 -->
                <div class="grid md:grid-cols-3 gap-6">
                    <div th:if="${activeTab != 'cancelled'}">
                        <p class="text-sm text-gray-500 mb-1">날짜</p>
                        <p class="font-semibold text-gray-900"
                           th:text="${reservation.slotStartAt != null ? #temporals.format(reservation.slotStartAt, 'yyyy-MM-dd') : '-'}">-</p>
                    </div>
                    <div th:if="${activeTab != 'cancelled'}">
                        <p class="text-sm text-gray-500 mb-1">시간</p>
                        <div th:if="${reservation.slotStartTimes != null and !reservation.slotStartTimes.isEmpty()}">
                            <p th:each="startTime,iter : ${reservation.slotStartTimes}"
                               class="font-semibold text-gray-900"
                               th:text="${#temporals.format(startTime, 'HH:mm') + ' ~ ' + #temporals.format(reservation.slotEndTimes[iter.index], 'HH:mm')}">-</p>
                        </div>
                        <p th:if="${reservation.slotStartTimes == null or reservation.slotStartTimes.isEmpty()}"
                           class="font-semibold text-gray-900">-</p>
                    </div>
                </div>

                <!-- 회의 목적 (메모) -->
                <div th:if="${reservation.memo != null and !reservation.memo.isBlank()}"
                     class="mt-5">
                    <p class="text-sm text-gray-500 mb-1">회의 목적</p>
                    <p class="font-medium text-gray-900" th:text="${reservation.memo}">-</p>
                </div>

                <!-- 대여 중인 비품 (파란 박스) -->
                <div th:if="${reservation.equipments != null and !reservation.equipments.isEmpty()}"
                     class="mt-5 rounded-lg border border-blue-200 bg-blue-50 px-4 py-3">
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex-1 min-w-0">
                            <p class="text-xs font-semibold text-blue-700 mb-1">대여 중인 비품</p>

                            <p class="text-sm text-blue-900">
                                <th:block th:each="equip,iter : ${reservation.equipments}">
                                    <input type="hidden"
                                           th:value="${equip.reservationEquipmentId}"
                                           class="reservation-equipment-id">
                                    <span th:text="${equip.equipmentName + ' × ' + equip.quantity}"></span><span th:if="${!iter.last}">, </span>
                                </th:block>
                            </p>
                            <p class="text-xs text-blue-600 mt-1">
                                비품 대여료: <span th:text="${#numbers.formatDecimal(reservation.equipmentTotalAmount, 0, 'COMMA', 0, 'POINT') + '원'}">-</span>
                            </p>
                        </div>


                    <!-- 비품 취소하기 버튼  -->
                        <form th:action="@{/reservations/{id}/equipments/cancel(id=${reservation.reservationId})}"
                              method="post" th:id="'cancelEquipmentsForm-' + ${reservation.reservationId}"
                              onsubmit="return false;">
                          <!--  모든 비품 ID hidden -->
                            <th:block th:each="equip : ${reservation.equipments}">
                                <input type="hidden" name="reservationEquipmentIds"
                                       th:value="${equip?.reservationEquipmentId}"/>

                            </th:block>
                        <!--     취소 사유 hidden (모달에서 입력 후 채움) -->
                            <input type="hidden" name="reason"
                                   th:id="'cancelReasonInput-' + ${reservation.reservationId}"/>

                            <button th:if="${activeTab == 'upcoming'}" type="button"
                                    th:onclick="'openCancelModal(' + ${reservation.reservationId} + ')'"
                                    class="flex-shrink-0 text-sm font-medium text-red-500 hover:text-red-700 transition-colors whitespace-nowrap">
                                × 전체 비품 취소하기
                            </button>
                        </form>

                    </div>
                </div>

                <!-- 모달 -->
                <div id="cancelModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
                    <div class="bg-white rounded-2xl p-6 w-96 shadow-lg">
                        <h3 class="text-lg font-semibold mb-4">비품 전체 취소 사유 입력</h3>
                        <textarea id="cancelReasonTextarea"
                                  class="w-full h-24 p-2 border rounded-md border-gray-300"
                                  placeholder="취소 사유를 입력해주세요"></textarea>
                        <div class="mt-4 flex justify-end gap-2">
                            <button class="px-4 py-2 bg-gray-200 rounded-md" onclick="closeCancelModal()" type="button">취소</button>
                            <button class="px-4 py-2 bg-red-500 text-white rounded-md" onclick="submitCancelForm()" type="button">확인</button>
                        </div>
                    </div>
                </div>

                <!-- 취소 정보 -->
                <div th:if="${activeTab == 'cancelled' and reservation.cancelledAt != null}"
                     class="mt-5 rounded-lg bg-red-50 px-4 py-3">
                    <p class="text-sm font-semibold text-red-900 mb-1">취소된 예약</p>
                    <p class="text-sm text-gray-700">
                        취소 일시: <span th:text="${reservation.cancelledAt != null ? #temporals.format(reservation.cancelledAt, 'yyyy-MM-dd HH:mm') : '-'}">-</span>
                    </p>
                    <p th:if="${reservation.cancelReason != null}" class="text-sm text-gray-700 mt-1">
                        취소 사유: <span th:text="${reservation.cancelReason}">-</span>
                    </p>
                </div>

            </div>

            <!-- 결제 정보 -->
            <div class="bg-gray-50 px-6 py-4 border-t border-gray-100">

                <!-- 회의실 대여료 -->
                <div th:if="${activeTab != 'cancelled'}" class="flex items-center justify-between text-sm text-gray-600 mb-1">
                    <span>회의실 대여료</span>
                    <span th:text="${#numbers.formatDecimal(reservation.totalAmount, 0, 'COMMA', 0, 'POINT') + '원(' + reservation.totalSlotHours + '시간 × ' + #numbers.formatDecimal(reservation.roomHourlyPrice, 0, 'COMMA', 0, 'POINT') + '원/시간)'}">-</span>
                </div>

                <!-- 비품 대여료 (비품 있을 때만) -->
                <div th:if="${activeTab != 'cancelled' and reservation.equipmentTotalAmount != null and reservation.equipmentTotalAmount.intValue() > 0}"
                     class="flex items-center justify-between text-sm text-gray-600 mb-2">
                    <span>비품 대여료</span>
                    <span th:text="${#numbers.formatDecimal(reservation.equipmentTotalAmount, 0, 'COMMA', 0, 'POINT') + '원'}">-</span>
                </div>

                <!-- 총 결제 금액 -->
                <div class="flex items-center justify-between pt-2 border-t border-gray-200">
                    <span class="font-semibold text-gray-900">총 결제 금액</span>
                    <span class="text-xl font-bold text-slate-900"
                          th:text="${reservation.grandTotalAmount != null ? #numbers.formatDecimal(reservation.grandTotalAmount, 0, 'COMMA', 0, 'POINT') + '원' : '0원'}">0원</span>
                </div>

                <!-- 예정된 예약에만 취소 버튼 -->
                <div th:if="${activeTab == 'upcoming'}" class="mt-4 pt-4 border-t border-gray-200">
                    <form th:action="@{/reservations/{id}/cancel(id=${reservation.reservationId})}"
                          method="post"
                          class="cancel-form">

                        <button type="submit"
                                class="inline-flex items-center justify-center h-[44px] w-full rounded-md border border-red-300 bg-white text-sm font-medium text-red-600 hover:bg-red-50 transition-colors">
                            × 회의실 취소하기
                        </button>

                    </form>
                </div>

            </div>

        </div>
    </div>

</main>
</body>
<script th:src="@{/js/reservation-list.js}"></script>
</html>
