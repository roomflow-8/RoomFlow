<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<title>Error Page</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			text-align: center;
			padding: 80px;
			background-color: #f8f9fa;
		}
		.container {
			max-width: 600px;
			margin: 0 auto;
			background: white;
			padding: 40px;
			border-radius: 12px;
			box-shadow: 0 4px 10px rgba(0,0,0,0.08);
		}
		h1 {
			font-size: 40px;
			margin-bottom: 20px;
		}
		p {
			color: #555;
			margin-bottom: 30px;
		}
		a {
			display: inline-block;
			padding: 12px 20px;
			background: #2563eb;
			color: white;
			text-decoration: none;
			border-radius: 8px;
		}
	</style>
</head>

<body>
<div class="container">
	<h1 th:text="${status}">오류코드</h1>

	<p th:if="${status == 404}">요청하신 페이지를 찾을 수 없습니다.</p>
	<p th:if="${status == 403}">접근 권한이 없습니다.</p>
	<p th:if="${status == 500}">서버 내부 오류가 발생했습니다.</p>
	<p th:if="${status != 404 and status != 403 and status != 500}">
		요청을 처리하는 중 문제가 발생했습니다.
	</p>

	<a th:href="@{/rooms}">홈으로 이동</a>
</div>
<!--<h2>[[${exception}]]</h2>-->
<!--<h2>[[${path}]]</h2>-->
<!--<h2>[[${status}]]</h2>-->
<!--<h2>[[${message}]]</h2>-->
</body>
</html>
